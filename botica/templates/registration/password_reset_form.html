<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar cuenta - Botica Virgen de Huata</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eefaf7, #f9fffd);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .caja {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }
        h2 {
            margin-top: 0;
            color: #145e55;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 18px;
            border: 1px solid #cfe5de;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0f9d8a;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 14px;
            color: #0f7f70;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="caja">
        <h2>Recuperar cuenta</h2>
        <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit">Enviar enlace</button>
        </form>

        <a href="/login/">Volver al login</a>
    </div>
</body>
</html>
